# е…Ҙз«ҷ  

tun:
  enable: true
  # system/gvisor/mixed
  # 1. еҚҸи®®ж ҲпјҡLinux иҪҜи·Ҝз”ұеҝ…йЎ»йҖү system жҖ§иғҪжңҖеҘҪ
