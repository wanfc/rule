  # 2. и®ҫеӨҮеҗҚпјҡLinux дёӢйҖҡеёёеҸ« tun0 жҲ– mihomoпјҢutun жҳҜ macOS зҡ„еҸ«жі•(иҷҪдёҚжҠҘй”ҷдҪҶе»әи®®ж”№)
  device: mihomo-tun
  # 3. иҮӘеҠЁжЈҖжөӢжҺҘеҸЈпјҡејәзғҲе»әи®®ејҖеҗҜпјҒи§ЈеҶід№ӢеүҚзҡ„ EOF е’ҢиҝһжҺҘи¶…ж—¶й—®йўҳ
  auto-detect-interface: true
  # 4. DNS еҠ«жҢҒпјҡдҝқжҢҒеҺҹж ·
  dns-hijack: ["any:53", "tcp://any:53"]
  # 5. NAT зұ»еһӢпјҡдҝқжҢҒ trueпјҢеҜ№ P2P е’ҢжёёжҲҸиҮіе…ійҮҚиҰҒ
  endpoint-independent-nat: true

  # 6. и·Ҝз”ұи®ҫзҪ®пјҡеҰӮжһңжҳҜ OpenClash жҸ’д»¶жҺҘз®ЎпјҢиҝҷдҝ©йҖҡеёёдјҡиў«жҸ’д»¶иҰҶзӣ–пјӣеҰӮжһңжҳҜжүӢжҗ“й…ҚзҪ®пјҢе»әи®®ејҖеҗҜ
  auto-route: true
  auto-redirect: true  # дё»иҰҒжҳҜеӨ„зҗҶдёҖдәӣиҝһдёҚдёҠд»ЈзҗҶзҡ„жөҒйҮҸ
