# DNS и®ҫзҪ®

dns:
  enable: true
  listen: 0.0.0.0:7874
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 28.0.0.1/8

  # ============================================
  # 1. еј•еҜј DNS (Bootstrap - еҗҜеҠЁз¬¬дёҖжӯҘ)
  # ============================================
  # з”ЁдәҺи§ЈжһҗдёӢйқў DoH еҹҹеҗҚзҡ„ IPпјҢеҝ…йЎ»жҳҜзәҜ IP ж јејҸ
  default-nameserver:
    - 223.5.5.5
    - 1.12.12.12

  # ============================================
  # 2. иЎҢдёәдёҺжҖ§иғҪеҸӮж•°
  # ============================================
  cache-algorithm: arc      # зј“еӯҳз®—жі•
  prefer-h3: false          # жҳҜеҗҰдјҳе…Ҳ H3
  use-hosts: true           # жҳҜеҗҰеҠ иҪҪзі»з»ҹ hosts
  respect-rules: true       # йҒөеҫӘеҲҶжөҒи§„еҲҷ

  # ============================================
  # 3. зӯ–з•ҘеҲҶжөҒ (дјҳе…Ҳзә§ Max - еұҖеҹҹзҪ‘/еҶ…зҪ‘/зү№дҫӢ)
  # ============================================
  nameserver-policy:
    # йҒҮеҲ° private еҲ—иЎЁйҮҢзҡ„еҹҹеҗҚпјҢејәеҲ¶еҗ‘жң¬ең°зҪ‘е…і(DHCP)жҲ–е…·дҪ“и·Ҝз”ұеҷЁIPжҹҘиҜў
    # жҲ–иҖ…еҶҷжӯ»зҪ‘е…і IPпјҢдҫӢеҰӮ '192.168.31.1'
    'rule-set:private_domain': 'dhcp://br-lan'    # еұҖеҹҹзҪ‘еҹҹеҗҚ -> й—®жң¬ең°зҪ‘е…і
    'rule-set:google_domain,telegram_domain':
      - https://cloudflare-dns.com/dns-query
      - https://dns.google/dns-query
    # ејәеҲ¶и®© OpenClash з”ЁзәҜеҮҖеӨ–зҪ‘ IP её® AGH и§Јжһҗ DoH еҹҹеҗҚпјҢеҪ»еә•еҲҮж–ӯеҫӘзҺҜпјҒ
    # 'dns.alidns.com': '223.5.5.5'
    # '+.doh.pub': '1.12.12.12'          # дёҖиЎҢе…је®№ doh.pub е’Ң sm2.doh.pub
    # '+.dot.pub': '1.12.12.12'
    # '+.onedns.net': '223.5.5.5'          # дёҖиЎҢз§’жқҖжүҖжңү OneDNS зҡ„жӢҰжҲӘ/зәҜеҮҖ/е®¶еәӯзүҲ
    # 'miwifi.com': '192.168.31.1'                # зү№е®ҡи·Ҝз”ұеҹҹеҗҚ -> й—®жҢҮе®ҡIP
    # '+.company.com': '10.10.10.1'               # е…¬еҸёеҶ…зҪ‘ -> й—®е…¬еҸёDNS


  # ============================================
  # 4. иҠӮзӮ№еҹҹеҗҚи§Јжһҗ (дјҳе…Ҳзә§ High - жңәеңәиҝһжҺҘ)
  # ============================================
  proxy-server-nameserver:
    - 10.0.0.1:5335
    # - https://dns.alidns.com/dns-query
    # - https://sm2.doh.pub/dns-query

  # ============================================
  # 5. й»ҳи®ӨйҖҡз”Ёи§Јжһҗ (CN еҹҹеҗҚ & IP еҢ№й…Қ)
  # ============================================
  # nameserver еҲ—иЎЁдё»иҰҒз”ЁдәҺи§ЈжһҗеӣҪеҶ…еҹҹеҗҚпјҲзӣҙиҝһжөҒйҮҸпјүд»ҘеҸҠеңЁ Fake-IP жЁЎејҸдёӢиҝӣиЎҢ IP и§„еҲҷеҢ№й…Қ
  # еҚғдёҮдёҚиҰҒеңЁ nameserver еҲ—иЎЁдёӯеҠ е…Ҙ https://cloudflare-dns.com/dns-query
  nameserver:
    - 10.0.0.1:5335

  # ============================================
  # 6. Fake-IP иҝҮж»Өи®ҫзҪ®
  # ============================================
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    # ... (йҖ»иҫ‘йЎәеәҸпјҡз§Ғжңү -> иҝҗиҗҘе•Ҷ -> й“¶иЎҢ -> еӨ§еҺӮе…је®№ -> жёёжҲҸ) ...
    # жіЁж„Ҹ: дёҚиҰҒеңЁиҝҷйҮҢеҠ е…Ҙ 'geosite:cn'гҖӮжҲ‘д»¬еёҢжңӣеӣҪеҶ…еҹҹеҗҚд№ҹиө° Fake-IP,иҝҷж ·жҲ‘д»¬жүҚиғҪеңЁ`rules:`дёӯеҜ№е®ғд»¬еә”з”Ёе№ҝе‘ҠжӢҰжҲӘзӯүи§„еҲҷ
    # дёҚиҰҒеҸӘдҫқиө– rule-setпјҢжүӢеҠЁеҠ дёҠиҝҷеҮ дёӘйҖҡй…Қз¬ҰеҒҡеҸҢйҮҚдҝқйҷ©
    - '+.lan'
    - '+.local'
    - 'openwrt'
    - 'localhost'    

    # еҹәзЎҖи®ҫж–ҪдёҺеұҖеҹҹзҪ‘ (з»қеҜ№ж ёеҝғ)
