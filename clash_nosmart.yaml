  # 7. MTUпјҡTUN жЁЎејҸдёӢе»әи®®и®ҫдёә 9000 (Jumbo Frame) д»ҘеҲ©з”Ё GSO/GRO еҮҸе°‘ CPU дёӯж–ӯ
  mtu: 9000
  # 8. вӯҗ ж ёеҝғжҖ§иғҪдјҳеҢ–пјҡејҖеҗҜ GSO (Generic Segmentation Offload)
