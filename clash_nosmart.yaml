# ====================
# е…ЁеұҖй…ҚзҪ® 

# ====================
# 1. з«ҜеҸЈи®ҫзҪ® (дҝқжҢҒеҺҹж ·еҚіеҸҜ)
# ====================
port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
tproxy-port: 7894

# ====================
# 2. еұҖеҹҹзҪ‘и®ҝй—®
# ====================
allow-lan: true
udp: true
bind-address: "*"

# вҡ пёҸ IPv6пјҡиҪҜи·Ҝз”ұе»әи®®е…ій—ӯпјҢйҳІжӯў IPv6 жі„йңІеҜјиҮҙ Google и®ӨдёәдҪ дҪҚзҪ®и·іеҠЁ
# йҷӨйқһдҪ жңүжҳҺзЎ®зҡ„ IPv6 зӣҙиҝһйңҖжұӮдё”й…ҚзҪ®дәҶе®ҢзҫҺзҡ„йҳІзҒ«еўҷ
ipv6: false

# ====================
# 3. иҝһжҺҘдёҺжҖ§иғҪ (е…ій”®дјҳеҢ–)
# ====================
# еҪұе“Қ Clash дёҺ жңәеңәжңҚеҠЎеҷЁ зҡ„иҝһжҺҘ (жҺЁиҚҗејҖеҗҜ)
global-tfo: true
# еҪұе“Қ еұҖеҹҹзҪ‘и®ҫеӨҮ дёҺ Clash зҡ„иҝһжҺҘ (е»әи®®е…ій—ӯпјҢWindows е®ўжҲ·з«Ҝе…је®№жҖ§е·®)
tcp-fast-open: false

# з»ҹдёҖе»¶иҝҹпјҡдёҚд»…еҮҸеҺ»жҸЎжүӢж¶ҲиҖ—пјҢиҝҳиғҪе№іж»‘жҠ–еҠЁпјҢйҖүиҠӮзӮ№жӣҙеҮҶ
unified-delay: true
# TCP е№¶еҸ‘пјҡе№¶еҸ‘иҝһжҺҘжүҖжңүиҠӮзӮ№жөӢйҖҹпјҢйҖүиҠӮзӮ№жӣҙеҝ« (иҪҜи·Ҝз”ұжҖ§иғҪи¶іеӨҹж—¶е»әи®®ејҖеҗҜ)
tcp-concurrent: false

# вқҢ еҝ…йЎ»жіЁйҮҠжҺү interface-nameпјҒ
# еӣ дёәжҲ‘д»¬еңЁ tun й…ҚзҪ®йҮҢе·Із»ҸејҖдәҶ auto-detect-interface: true
# иҝҷйҮҢеҶҚеҶҷжӯ»дјҡеҜјиҮҙеҶІзӘҒжҲ–жҠҘй”ҷ
# interface-name: enp6s18

# ====================
# 4. иҝҗиЎҢжЁЎејҸдёҺж—Ҙеҝ—
# ====================
mode: rule
log-level: silent

# [йҮҚзӮ№] иҝӣзЁӢеҢ№й…ҚжЁЎејҸ
# иҪҜи·Ҝз”ұеҝ…йЎ»и®ҫдёә "off"гҖӮеӣ дёәи·Ҝз”ұеұӮж— жі•иҺ·еҸ–еұҖеҹҹзҪ‘з”өи„‘дёҠзҡ„иҝӣзЁӢеҗҚ(exe)
# ејҖеҗҜ strict/always еҸӘдјҡеҫ’еўһ CPU ж¶ҲиҖ—дё”ж°ёиҝңеҢ№й…ҚдёҚеҲ°
find-process-mode: 'off'

# й•ҝиҝһжҺҘдҝқжҙ» (дјҳеҢ–еҸӮж•°)
# idleй»ҳи®Ө 600s жңүзӮ№й•ҝпјҢе»әи®®ж”№дёә 30s-60sпјҢйҳІжӯўиҝҗиҗҘе•Ҷ NAT иЎЁиҖҒеҢ–еҜјиҮҙж–ӯиҝһ
keep-alive-idle: 180
keep-alive-interval: 30 
# е»әи®®ејҖеҗҜ external-controller-tls еҗҺзҡ„е®үе…ЁйӘҢиҜҒ (е®¶еәӯзҺҜеўғеҸҜеҝҪз•Ҙ)
# еҗ«д№үпјҡе®ғз»ҷжӮЁзҡ„ 9090 жҺ§еҲ¶еҸ°з«ҜеҸЈеҠ дёҠ HTTPS еҠ еҜҶй”ҒгҖӮ
# дҪңз”ЁпјҡйҳІжӯўжңүдәәеңЁеұҖеҹҹзҪ‘йҮҢжҠ“еҢ…зӘғеҗ¬жӮЁжҺ§еҲ¶ Clash зҡ„жҢҮд»ӨгҖӮ
# з»“и®әпјҡеңЁе®¶йҮҢе®Ңе…ЁдёҚйңҖиҰҒгҖӮ ејҖеҗҜеҗҺеҸҚиҖҢдјҡеҜјиҮҙеҫҲеӨҡ Dashboard йқўжқҝиҝһдёҚдёҠпјҲеӣ дёәиҜҒд№ҰжҳҜиҮӘзӯҫеҗҚзҡ„пјҢжөҸи§ҲеҷЁдјҡжҠҘиӯҰпјүпјҢиҜ·дҝқжҢҒе…ій—ӯгҖӮ

# ====================
# 5. GEO ж•°жҚ®еә“иҮӘеҠЁжӣҙж–°
# ====================
# Mihomo зү№жҖ§пјҡиҮӘеҠЁжӣҙж–° GeoIP е’Ң GeoSite ж•°жҚ®еә“
# йҳІжӯў "RuleSet жүҫдёҚеҲ°еҹҹеҗҚ" жҲ–иҖ… "IP еә“еӨӘж—§иҜҶеҲ«й”ҷиҜҜ"
# geodata-mode: true         # дҪҝз”Ё .dat зүҲж•°жҚ®еә“ (дҪ“з§Ҝе°ҸпјҢеҠ иҪҪеҝ«)
# geodata-loader: standard   # ж ҮеҮҶеҠ иҪҪеҷЁ
# geo-auto-update: true      # ејҖеҗҜиҮӘеҠЁжӣҙж–°
# geo-update-interval: 24    # жҜҸ 24 е°Ҹж—¶жЈҖжҹҘдёҖж¬Ў

# [ж–°еўһ] е…ЁеұҖ User-Agent
# жӢүеҸ–и®ўйҳ…жҲ–ж•°жҚ®еә“ж—¶дјӘиЈ…жҲҗжөҸи§ҲеҷЁпјҢйҳІжӯўиў«жҹҗдәӣжәҗжӢ’з»қ
global-ua: chrome

# ====================
# 6. жҢҒд№…еҢ–дёҺжҺ§еҲ¶еҸ°
# ====================
profile:
  store-selected: true   # йҮҚеҗҜеҗҺи®°дҪҸдёҠж¬ЎйҖүзҡ„иҠӮзӮ№
  store-fake-ip: false    # и®°дҪҸ Fake-IP жҳ е°„ (еҠ еҝ«дәҢж¬Ўи®ҝй—®пјҢдҪҶдјҡеҶҷзЎ¬зӣҳ)

